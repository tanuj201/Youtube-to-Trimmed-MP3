<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube to Trimmed MP3</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tailwind Config for Custom Colors -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            900: '#4c1d95',
                        },
                        dark: {
                            900: '#0f111a',
                            800: '#1a1d2d',
                            700: '#272b40',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark-900 text-gray-200 font-sans min-h-screen flex flex-col items-center py-12 px-4 selection:bg-brand-500 selection:text-white">

    <div class="w-full max-w-3xl glass-panel rounded-2xl shadow-2xl p-8 relative overflow-hidden bg-dark-800/80 border border-dark-700 backdrop-blur-xl">
        <!-- Background Glow -->
        <div class="absolute -top-24 -right-24 w-64 h-64 bg-brand-600 rounded-full mix-blend-screen filter blur-[80px] opacity-30 animate-pulse"></div>
        <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-blue-600 rounded-full mix-blend-screen filter blur-[80px] opacity-30"></div>

        <div class="relative z-10">
            <header class="text-center mb-10">
                <h1 class="text-4xl md:text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-brand-400 to-blue-400 mb-4">
                    YouTube to MP3 Trimmer
                </h1>
                <p class="text-gray-400 text-lg">Extract the perfect audio snippet from any YouTube video.</p>
            </header>

            <!-- URL Input Section -->
            <section id="url-section" class="mb-10 transition-all duration-500">
                <form id="fetch-form" class="relative group">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                        <i class="fa-brands fa-youtube text-gray-400 group-focus-within:text-brand-400 transition-colors"></i>
                    </div>
                    <input type="url" id="youtube-url" required placeholder="Paste YouTube URL here..." 
                        class="block w-full p-5 pl-12 text-lg text-white bg-dark-900 border border-dark-700 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all outline-none shadow-inner" />
                    <button type="submit" id="fetch-btn" class="absolute right-2.5 bottom-2.5 top-2.5 text-white bg-brand-600 hover:bg-brand-500 focus:ring-4 focus:outline-none focus:ring-brand-500/50 font-medium rounded-lg text-sm px-6 py-2 transition-all shadow-[0_0_15px_rgba(124,58,237,0.3)] hover:shadow-[0_0_25px_rgba(124,58,237,0.5)] flex items-center gap-2">
                        <span>Fetch</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>
                <div id="fetch-error" class="hidden mt-3 text-red-400 text-sm flex items-center gap-2">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span id="fetch-error-msg">Invalid URL.</span>
                </div>
            </section>

            <!-- Loading Spinner for Fetch -->
            <div id="fetch-loader" class="hidden flex-col items-center justify-center py-8">
                <div class="w-10 h-10 border-4 border-brand-500/30 border-t-brand-500 rounded-full animate-spin mb-4"></div>
                <p class="text-gray-400">Fetching video details...</p>
            </div>

            <!-- Video Preview & Trimming Section (Hidden Initially) -->
            <section id="preview-section" class="hidden opacity-0 transition-opacity duration-500">
                <div class="flex flex-col md:flex-row gap-6 mb-8 bg-dark-900/50 p-4 rounded-xl border border-dark-700">
                    <!-- Thumbnail -->
                    <div class="w-full md:w-1/3 aspect-video rounded-lg overflow-hidden relative shadow-lg group">
                        <img id="video-thumbnail" src="" alt="Video Thumbnail" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" />
                        <div class="absolute bottom-2 right-2 bg-black/80 text-white text-xs font-mono px-2 py-1 rounded backdrop-blur-sm">
                            <span id="video-duration-text">00:00</span>
                        </div>
                    </div>
                    
                    <!-- Metadata -->
                    <div class="w-full md:w-2/3 flex flex-col justify-center">
                        <h2 id="video-title" class="text-xl font-semibold text-white mb-2 line-clamp-2" title="Video Title">Loading...</h2>
                        <p class="text-gray-400 text-sm mb-4"><i class="fa-solid fa-music mr-2 text-brand-400"></i>High Quality MP3 (192kbps)</p>
                    </div>
                </div>

                <!-- Trimmer Controls -->
                <div class="mb-10 bg-dark-900/50 p-6 rounded-xl border border-dark-700 shadow-inner">
                    <h3 class="text-lg font-medium text-white mb-6 flex items-center gap-2">
                        <i class="fa-solid fa-scissors text-brand-400"></i> Select Segment to Trim
                    </h3>
                    
                    <!-- Dual Range Slider Container -->
                    <div class="range-slider-container relative w-full h-10 mb-8 select-none">
                        <!-- Custom track and progress -->
                        <div class="absolute top-1/2 -translate-y-1/2 w-full h-2 bg-dark-800 rounded-full overflow-hidden shadow-inner border border-dark-700"></div>
                        <div id="slider-progress" class="absolute top-1/2 -translate-y-1/2 h-2 bg-gradient-to-r from-brand-500 to-blue-500 rounded-full z-10 pointer-events-none transition-all duration-75"></div>
                        
                        <!-- Inputs (opacity 0, layered on top) -->
                        <input type="range" id="slider-min" class="absolute top-1/2 -translate-y-1/2 w-full appearance-none bg-transparent pointer-events-auto z-20 slider-thumb" min="0" max="100" value="0" step="1">
                        <input type="range" id="slider-max" class="absolute top-1/2 -translate-y-1/2 w-full appearance-none bg-transparent pointer-events-auto z-30 slider-thumb" min="0" max="100" value="100" step="1">
                    </div>

                    <!-- Time Inputs -->
                    <div class="flex justify-between items-center gap-4">
                        <div class="flex flex-col gap-1 w-1/3">
                            <label for="time-start" class="text-xs text-gray-400 uppercase tracking-wider font-semibold">Start Time</label>
                            <div class="relative">
                                <input type="text" id="time-start" value="00:00:00" class="w-full bg-dark-800 border border-dark-700 text-white text-center rounded-lg py-2 px-3 font-mono text-sm focus:ring-2 focus:ring-brand-500 outline-none transition-all" />
                            </div>
                        </div>
                        
                        <div class="text-gray-500">
                            <i class="fa-solid fa-arrow-right-long"></i>
                        </div>

                        <div class="flex flex-col gap-1 w-1/3">
                            <label for="time-end" class="text-xs text-gray-400 uppercase tracking-wider font-semibold text-right">End Time</label>
                            <div class="relative">
                                <input type="text" id="time-end" value="00:00:00" class="w-full bg-dark-800 border border-dark-700 text-white text-center rounded-lg py-2 px-3 font-mono text-sm focus:ring-2 focus:ring-brand-500 outline-none transition-all" />
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Action Button -->
                <button id="convert-btn" class="w-full relative group overflow-hidden bg-brand-600 hover:bg-brand-500 text-white text-lg font-semibold py-4 px-6 rounded-xl transition-all shadow-[0_0_20px_rgba(124,58,237,0.4)] hover:shadow-[0_0_35px_rgba(124,58,237,0.6)] focus:outline-none focus:ring-4 focus:ring-brand-500/50 transform hover:-translate-y-1">
                    <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
                    <span class="relative z-10 flex items-center justify-center gap-3">
                        <i class="fa-solid fa-cloud-arrow-down"></i> Convert & Download MP3
                    </span>
                </button>

                <!-- Processing State -->
                <div id="process-loader" class="hidden mt-6 bg-dark-900 border border-dark-700 rounded-xl p-5 text-center">
                    <p class="text-brand-400 font-medium mb-3">Processing Video & Extracting Audio...</p>
                    <div class="w-full bg-dark-800 rounded-full h-2.5 mb-2 overflow-hidden border border-dark-700">
                        <div class="bg-gradient-to-r from-brand-500 to-blue-500 h-2.5 rounded-full relative overflow-hidden w-full">
                            <div class="absolute inset-0 bg-white/20 animate-[progressStripes_1s_linear_infinite]" style="background-image: linear-gradient(45deg, rgba(255,255,255,.15) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.15) 50%, rgba(255,255,255,.15) 75%, transparent 75%, transparent); background-size: 1rem 1rem;"></div>
                        </div>
                    </div>
                    <p class="text-xs text-gray-500">This might take a moment depending on the segment length.</p>
                </div>
            </section>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
</body>
</html>
